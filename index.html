<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Pop the Balloon 🎈 | Happy Holi 🌈</title>
  <style>
    :root { color-scheme: dark; }

    body{
      margin:0;
      min-height:100vh;
      display:grid;
      place-items:center;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      overflow:hidden;
      background:
        radial-gradient(1200px 700px at 20% 15%, rgba(255,79,216,.28), transparent 55%),
        radial-gradient(900px 600px at 80% 25%, rgba(0,212,255,.22), transparent 55%),
        radial-gradient(1000px 700px at 55% 85%, rgba(77,255,154,.18), transparent 60%),
        radial-gradient(1400px 900px at 50% 50%, #24154f, #0b0b12 70%);
    }

    /* soft twinkles */
    .twinkle{
      position:fixed; inset:0; pointer-events:none; z-index:1; opacity:.55;
      background-image:
        radial-gradient(circle at 10% 20%, rgba(255,255,255,.8) 0 1px, transparent 2px),
        radial-gradient(circle at 30% 70%, rgba(255,255,255,.6) 0 1px, transparent 2px),
        radial-gradient(circle at 55% 30%, rgba(255,255,255,.7) 0 1px, transparent 2px),
        radial-gradient(circle at 75% 60%, rgba(255,255,255,.6) 0 1px, transparent 2px),
        radial-gradient(circle at 90% 25%, rgba(255,255,255,.7) 0 1px, transparent 2px),
        radial-gradient(circle at 15% 85%, rgba(255,255,255,.6) 0 1px, transparent 2px);
      filter: blur(.2px);
    }

    canvas{
      position:fixed; inset:0;
      width:100vw; height:100vh;
      pointer-events:none;
      z-index:2;
    }

    .card{
      width:min(560px, 92vw);
      text-align:center;
      padding: 22px 18px 18px;
      border-radius: 22px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.14);
      backdrop-filter: blur(10px);
      box-shadow: 0 20px 60px rgba(0,0,0,0.45);
      z-index:3;
      position:relative;
    }

    h1{
      margin: 6px 0 8px;
      font-size: 22px;
      opacity:.95;
      letter-spacing:.2px;
    }

    .hint{
      margin: 0 0 14px;
      opacity:.9;
      font-size: 14px;
      line-height:1.35;
    }

    /* Balloon */
    .balloon-wrap{
      position: relative;
      height: 260px;
      display:grid;
      place-items:center;
      margin: 6px 0 4px;
    }

    .balloon{
      width: 140px;
      height: 180px;
      border-radius: 50% 50% 45% 45%;
      position: relative;
      cursor: pointer;
      user-select:none;
      -webkit-tap-highlight-color: transparent;

      background: radial-gradient(circle at 30% 25%, rgba(255,255,255,.7), rgba(255,255,255,.0) 35%),
                  linear-gradient(135deg, #ff4fd8, #7c5cff, #00d4ff);
      box-shadow: 0 30px 70px rgba(0,0,0,.35);
      transform-origin: 50% 90%;
      animation: floaty 3.2s ease-in-out infinite;
    }

    .balloon::after{
      /* shine */
      content:"";
      position:absolute;
      left: 22px; top: 26px;
      width: 26px; height: 70px;
      border-radius: 999px;
      background: rgba(255,255,255,.22);
      transform: rotate(18deg);
      filter: blur(.3px);
    }

    .knot{
      position:absolute;
      bottom: -10px; left: 50%;
      transform: translateX(-50%);
      width: 18px; height: 14px;
      background: rgba(255,255,255,.25);
      clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
      filter: saturate(1.2);
    }

    .string{
      position:absolute;
      bottom: -118px; left: 50%;
      transform: translateX(-50%);
      width: 2px; height: 120px;
      background: rgba(255,255,255,.35);
      border-radius: 999px;
      opacity:.9;
    }

    @keyframes floaty{
      0%,100%{ transform: translateY(0) rotate(-2deg); }
      50%{ transform: translateY(-16px) rotate(2deg); }
    }

    /* Popped state */
    .popped{
      animation: pop .18s ease forwards;
    }
    @keyframes pop{
      to{ transform: scale(0.0); opacity:0; }
    }

    /* Message after pop */
    .msg{
      margin-top: 10px;
      font-size: 40px;
      line-height: 1.05;
      display:none;
      background: linear-gradient(90deg,#ff4fd8,#ffd34f,#4dff9a,#4fd8ff,#9a4dff);
      -webkit-background-clip:text;
      background-clip:text;
      color:transparent;
      text-shadow: 0 12px 50px rgba(0,0,0,.25);
    }
    .sub{
      display:none;
      margin: 8px 0 0;
      font-size: 16px;
      opacity:.93;
    }

    .btns{
      display:none;
      margin-top: 14px;
      gap: 10px;
      justify-content:center;
      flex-wrap:wrap;
    }
    button{
      appearance:none; border:0; cursor:pointer;
      padding: 12px 16px;
      border-radius: 14px;
      font-weight: 750;
      font-size: 14px;
      transition: transform .08s ease, filter .2s ease;
    }
    button:active{ transform: scale(.98); }
    .again{
      background: linear-gradient(135deg, #ff4fd8, #7c5cff, #00d4ff);
      color:#0b0b12;
    }
    .reset{
      background: rgba(255,255,255,0.12);
      color:#fff;
      border: 1px solid rgba(255,255,255,0.20);
    }

    .footer{
      margin-top: 14px;
      font-size: 12px;
      opacity: .72;
    }

    /* small vibration hint on mobile when ready */
    .tap{
      display:inline-block;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(255,255,255,.10);
      border: 1px solid rgba(255,255,255,.14);
    }
  </style>
</head>
<body>
  <div class="twinkle"></div>
  <canvas id="fx"></canvas>

  <div class="card">
    <h1>🎈 A tiny Holi surprise</h1>
    <p class="hint"><span class="tap">Pop the balloon</span> 👆</p>

    <div class="balloon-wrap">
      <div class="balloon" id="balloon" aria-label="Balloon">
        <div class="knot"></div>
        <div class="string"></div>
      </div>
    </div>

    <div class="msg" id="msg">Happy Holi! 🌈</div>
    <div class="sub" id="sub">A very happy Holi to you and your family ✨</div>

    <div class="btns" id="btns">
      <button class="again" id="againBtn">Burst colours again 🎨</button>
      <button class="reset" id="resetBtn">Reset balloon 🎈</button>
    </div>

    <div class="footer">Tip: You can personalize the link with <b>?to=Name</b></div>
  </div>

<script>
  // Optional personalization: ?to=Riya
  const params = new URLSearchParams(location.search);
  const to = params.get("to");
  const subEl = document.getElementById("sub");
  if (to) subEl.textContent = `A very happy Holi to you and your family, ${to} ✨`;

  const balloon = document.getElementById("balloon");
  const msg = document.getElementById("msg");
  const btns = document.getElementById("btns");
  const againBtn = document.getElementById("againBtn");
  const resetBtn = document.getElementById("resetBtn");

  // Confetti / color burst
  const canvas = document.getElementById("fx");
  const ctx = canvas.getContext("2d");
  let W, H, pieces = [], rafId = null;

  function resize(){
    W = canvas.width = Math.floor(window.innerWidth * devicePixelRatio);
    H = canvas.height = Math.floor(window.innerHeight * devicePixelRatio);
  }
  window.addEventListener("resize", resize);
  resize();

  const COLORS = ["#ff4fd8","#ffd34f","#4dff9a","#4fd8ff","#9a4dff","#ff6b4d","#ffffff"];

  function burst(x, y, amount = 280){
    for(let i=0;i<amount;i++){
      const a = Math.random() * Math.PI * 2;
      const sp = (6 + Math.random()*11) * devicePixelRatio;
      pieces.push({
        x, y,
        vx: Math.cos(a) * sp,
        vy: Math.sin(a) * sp - 7 * devicePixelRatio,
        g: (0.22 + Math.random()*0.20) * devicePixelRatio,
        size: (3 + Math.random()*6) * devicePixelRatio,
        rot: Math.random()*Math.PI,
        vr: (Math.random()-0.5)*0.28,
        color: COLORS[(Math.random()*COLORS.length)|0],
        life: 0,
        max: 70 + (Math.random()*60|0)
      });
    }
    start();
  }

  function start(){
    if(rafId) return;
    const tick = ()=>{
      rafId = requestAnimationFrame(tick);
      ctx.clearRect(0,0,W,H);

      pieces = pieces.filter(p => p.life++ < p.max);
      for(const p of pieces){
        p.vy += p.g;
        p.x += p.vx;
        p.y += p.vy;
        p.rot += p.vr;

        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate(p.rot);
        ctx.fillStyle = p.color;
        ctx.globalAlpha = Math.max(0, 1 - p.life/p.max);
        ctx.fillRect(-p.size/2, -p.size/2, p.size, p.size*1.9);
        ctx.restore();
      }

      if(pieces.length === 0){
        cancelAnimationFrame(rafId);
        rafId = null;
      }
    };
    tick();
  }

  let popped = false;

  function popBalloon(){
    if(popped) return;
    popped = true;

    // get balloon center position for burst origin
    const r = balloon.getBoundingClientRect();
    const x = (r.left + r.width/2) * devicePixelRatio;
    const y = (r.top + r.height/2) * devicePixelRatio;

    balloon.classList.add("popped");

    // Show message
    msg.style.display = "block";
    subEl.style.display = "block";
    btns.style.display = "flex";

    // Burst colours
    burst(x, y, 320);
    setTimeout(()=>burst(x, y, 180), 260);

    // small phone vibration (if supported)
    if (navigator.vibrate) navigator.vibrate(60);
  }

  balloon.addEventListener("click", popBalloon);
  balloon.addEventListener("touchstart", popBalloon, {passive:true});

  againBtn.addEventListener("click", ()=>{
    const x = (W*0.5) + (Math.random()-0.5)*W*0.12;
    const y = (H*0.35) + (Math.random()-0.5)*H*0.10;
    burst(x, y, 260);
  });

  resetBtn.addEventListener("click", ()=>{
    popped = false;
    balloon.classList.remove("popped");
    // reset visibility
    msg.style.display = "none";
    subEl.style.display = "none";
    btns.style.display = "none";
    // restart balloon animation by forcing reflow
    void balloon.offsetWidth;
  });
</script>
</body>
</html>
